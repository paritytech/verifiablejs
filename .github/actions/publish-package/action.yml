name: Publish Package
description: Pack and publish a package via paritytech/npm_publish_automation

inputs:
  token:
    description: Token to dispatch to npm_publish_automation
    required: true
  tarball-name:
    description: Name for the tarball artifact
    required: true
  package-directory:
    description: Directory containing the package to publish
    required: true

runs:
  using: composite
  steps:
    - name: Pack package
      shell: bash
      working-directory: ${{ inputs.package-directory }}
      run: |
        pnpm pack
        mv *.tgz ${{ inputs.tarball-name }}.tgz

    - name: Upload tarball
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.tarball-name }}
        path: ${{ inputs.package-directory }}/${{ inputs.tarball-name }}.tgz

    - name: Dispatch to npm_publish_automation
      uses: octokit/request-action@v2.x
      with:
        route: POST /repos/paritytech/npm_publish_automation/dispatches
        event_type: publish-npm-package
        client_payload: |
          {
            "repo": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "artifact_name": "${{ inputs.tarball-name }}"
          }
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
